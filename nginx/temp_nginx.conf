# /etc/nginx/sites-available/vocarank.live
# Symlink: ln -s /etc/nginx/sites-available/vocarank.live /etc/nginx/sites-enabled/
#
# Requires certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d vocarank.live -d www.vocarank.live

# ── IMPORTANT: Add this to /etc/nginx/nginx.conf inside the http { } block ──
# limit_req_zone $binary_remote_addr zone=per_ip:10m rate=5r/s;
# ─────────────────────────────────────────────────────────────────────────────

# ── Redirect HTTP → HTTPS ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vocarank.live www.vocarank.live;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://vocarank.live$request_uri;
    }
}

# ── Redirect www → apex ──────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.vocarank.live;

    ssl_certificate     /etc/letsencrypt/live/vocarank.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocarank.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://vocarank.live$request_uri;
}

# ── Main site ────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name vocarank.live;

    ssl_certificate     /etc/letsencrypt/live/vocarank.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vocarank.live/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/vocarank.access.log;
    error_log  /var/log/nginx/vocarank.error.log;

    # ── Real IP extraction ────────────────────────────────────────────────────
    # Trust OpenWrt router as the upstream proxy so $remote_addr is the real client IP
    set_real_ip_from  192.168.0.254;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── IP blocklist (known scrapers / abusive bots) ──────────────────────────
    #deny 216.73.216.157;
    # Add more as needed:
    # deny x.x.x.x;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Maintenance page ─────────────────────────────────────────────────────
    # Served directly by NGINX when Next.js is unreachable (502/503/504)
    error_page 502 503 504 /maintenance.html;

    location = /maintenance.html {
        root /etc/nginx/maintenance;
        internal;
    }

    # ── Next.js app (port 3000) ───────────────────────────────────────────────
    location / {
        # Rate limit page requests: 10 req/s per IP, burst 500
        # Static assets are exempt (see location below)
        limit_req zone=per_ip burst=500 nodelay;
        limit_req_status 429;

        proxy_pass         http://192.168.0.212:3000;
        proxy_http_version 1.1;
        proxy_intercept_errors on;

        # Required for Next.js WebSocket (hot-reload) and App Router streaming
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_read_timeout 60s;
    }

    # ── Next.js static assets — NO rate limit, aggressive caching ─────────────
    # Regex location takes priority over location / so these never hit the limiter
    location ~* ^/_next/static/ {
        proxy_pass http://192.168.0.212:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(php|asp|aspx|env|git|sql|bak)$ {
        return 404;
    }

}
