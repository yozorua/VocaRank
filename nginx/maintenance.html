<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VocaRank — Under Maintenance</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&family=Noto+Serif+JP:wght@400;700&display=swap" rel="stylesheet" />
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg-dark:    #131417;
            --vermilion:  #E84A5F;
            --gold:       #D4AF37;
            --text-secondary: #8E8E93;
            --hairline:   rgba(255, 255, 255, 0.1);
        }

        html, body {
            height: 100%;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Noto Sans JP', sans-serif;
            overflow: hidden;
        }

        /* subtle noise overlay */
        body::before {
            content: "";
            position: fixed;
            inset: 0;
            z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
        }

        /* decorative vertical accent line */
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 1px;
            height: 100vh;
            background: linear-gradient(to bottom, transparent, var(--vermilion) 40%, var(--vermilion) 60%, transparent);
            opacity: 0.15;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 0;
            padding: 2rem;
            text-align: center;
        }

        /* top rule */
        .rule-top {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, transparent, var(--hairline));
            margin-bottom: 2.5rem;
        }

        .logo {
            font-family: 'Noto Serif JP', serif;
            font-size: clamp(1.6rem, 5vw, 2.4rem);
            font-weight: 700;
            letter-spacing: 0.04em;
            color: #fff;
            margin-bottom: 0.35rem;
        }

        .logo span {
            color: var(--vermilion);
        }

        .tagline {
            font-size: 0.7rem;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: var(--text-secondary);
            margin-bottom: 3rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            border: 1px solid var(--hairline);
            padding: 0.35rem 0.9rem;
            font-size: 0.7rem;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 2rem;
            animation: pulse-border 2.4s ease-in-out infinite;
        }

        @keyframes pulse-border {
            0%, 100% { border-color: rgba(255,255,255,0.10); }
            50%       { border-color: rgba(212,175,55,0.35); }
        }

        .badge-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--gold);
            animation: blink 1.2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0.2; }
        }

        h1 {
            font-size: clamp(1.1rem, 3.5vw, 1.5rem);
            font-weight: 700;
            letter-spacing: 0.03em;
            margin-bottom: 0.75rem;
        }

        p {
            font-size: 0.875rem;
            color: var(--text-secondary);
            line-height: 1.7;
            max-width: 380px;
        }

        /* bottom rule */
        .rule-bottom {
            width: 1px;
            height: 80px;
            background: linear-gradient(to bottom, var(--hairline), transparent);
            margin-top: 2.5rem;
        }

        .lang-note {
            position: fixed;
            bottom: 1.5rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.5;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <div class="wrap">
        <div class="rule-top"></div>

        <div class="logo">Voca<span>Rank</span></div>
        <div class="tagline">Vocaloid Music Rankings</div>

        <div class="badge">
            <div class="badge-dot"></div>
            Under Maintenance
        </div>

        <h1>We'll be right back</h1>
        <p>
            VocaRank is currently being updated.<br />
            Please check back in a few minutes.
        </p>
        <p style="margin-top:0.6rem; font-size:0.75rem;">
            <!-- メンテナンス中です。しばらくお待ちください。-->
            メンテナンス中 · 維護中
        </p>

        <div class="rule-bottom"></div>
    </div>

    <div class="lang-note">vocarank.live</div>
</body>
</html>
